blueprint:
  name: Sonoff BLE Remote (Text Sensor)
  description: Automation for swithman R5
  domain: automation
  input:
    remote_sensor:
      name: Sonoff Sensor
      description: Select text sensor
      selector:
        entity:
          domain: sensor
          integration: esphome
    
    # Button groups (Buttons 1–6, each with single/double/long press)
    btn_1_single:
      name: Button 1 - Single Press
      default: []
      selector: { action: {} }
    btn_1_double:
      name: Button 1 - Double Press
      default: []
      selector: { action: {} }
    btn_1_long:
      name: Button 1 - Long Press
      default: []
      selector: { action: {} }

    btn_2_single:
      name: Button 2 - Single Press
      default: []
      selector: { action: {} }
    btn_2_double:
      name: Button 2 - Double Press
      default: []
      selector: { action: {} }
    btn_2_long:
      name: Button 2 - Long Press
      default: []
      selector: { action: {} }

    btn_3_single:
      name: Button 3 - Single Press
      default: []
      selector: { action: {} }
    btn_3_double:
      name: Button 3 - Double Press
      default: []
      selector: { action: {} }
    btn_3_long:
      name: Button 3 - Long Press
      default: []
      selector: { action: {} }

    btn_4_single:
      name: Button 4 - Single Press
      default: []
      selector: { action: {} }
    btn_4_double:
      name: Button 4 - Double Press
      default: []
      selector: { action: {} }
    btn_4_long:
      name: Button 4 - Long Press
      default: []
      selector: { action: {} }

    btn_5_single:
      name: Button 5 - Single Press
      default: []
      selector: { action: {} }
    btn_5_double:
      name: Button 5 - Double Press
      default: []
      selector: { action: {} }
    btn_5_long:
      name: Button 5 - Long Press
      default: []
      selector: { action: {} }

    btn_6_single:
      name: Button 6 - Single Press
      default: []
      selector: { action: {} }
    btn_6_double:
      name: Button 6 - Double Press
      default: []
      selector: { action: {} }
    btn_6_long:
      name: Button 6 - Long Press
      default: []
      selector: { action: {} }

mode: parallel
max: 10

trigger:
  - platform: state
    entity_id: !input remote_sensor

condition:
  # Only run when sensor state is not empty (avoids triggering when sensor resets to "")
  - condition: template
    value_template: "{{ trigger.to_state.state != '' }}"

action:
  - variables:
      action_val: "{{ trigger.to_state.state }}"
  - choose:
      # Button 1
      - conditions: "{{ action_val == '1_single' }}"
        sequence: !input btn_1_single
      - conditions: "{{ action_val == '1_double' }}"
        sequence: !input btn_1_double
      - conditions: "{{ action_val == '1_long' }}"
        sequence: !input btn_1_long
      # Button 2
      - conditions: "{{ action_val == '2_single' }}"
        sequence: !input btn_2_single
      - conditions: "{{ action_val == '2_double' }}"
        sequence: !input btn_2_double
      - conditions: "{{ action_val == '2_long' }}"
        sequence: !input btn_2_long
      # Button 3
      - conditions: "{{ action_val == '3_single' }}"
        sequence: !input btn_3_single
      - conditions: "{{ action_val == '3_double' }}"
        sequence: !input btn_3_double
      - conditions: "{{ action_val == '3_long' }}"
        sequence: !input btn_3_long
      # Button 4
      - conditions: "{{ action_val == '4_single' }}"
        sequence: !input btn_4_single
      - conditions: "{{ action_val == '4_double' }}"
        sequence: !input btn_4_double
      - conditions: "{{ action_val == '4_long' }}"
        sequence: !input btn_4_long
      # Button 5
      - conditions: "{{ action_val == '5_single' }}"
        sequence: !input btn_5_single
      - conditions: "{{ action_val == '5_double' }}"
        sequence: !input btn_5_double
      - conditions: "{{ action_val == '5_long' }}"
        sequence: !input btn_5_long
      # Button 6
      - conditions: "{{ action_val == '6_single' }}"
        sequence: !input btn_6_single
      - conditions: "{{ action_val == '6_double' }}"
        sequence: !input btn_6_double
      - conditions: "{{ action_val == '6_long' }}"
        sequence: !input btn_6_long