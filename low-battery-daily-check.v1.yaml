blueprint:
  name: Daily Low Battery Check
  description: >
    Mỗi ngày vào một giờ cố định, quét toàn bộ entity có device_class = battery
    (hoặc các entity có thuộc tính `battery_level`) và gửi thông báo nếu có
    thiết bị nào dưới ngưỡng pin yếu.
  domain: automation
  input:
    check_time:
      name: Giờ kiểm tra
      description: Thời điểm trong ngày chạy kiểm tra pin.
      default: "08:00:00"
      selector:
        time: {}

    battery_threshold:
      name: Ngưỡng pin yếu (%)
      description: Thiết bị có pin <= ngưỡng này sẽ được báo.
      default: 20
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    notify_service:
      name: Dịch vụ thông báo
      description: >
        Tên service notify cần dùng, ví dụ `mobile_app_iphone` hoặc
        `persistent_notification`. KHÔNG kèm tiền tố `notify.`.
      default: persistent_notification
      selector:
        text: {}

    exclude_entities:
      name: Bỏ qua các entity
      description: Danh sách entity không muốn kiểm tra (ví dụ pin xe điện, UPS...).
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - device_class: battery

mode: single

trigger:
  - platform: time
    at: !input check_time

variables:
  threshold: !input battery_threshold
  excluded: !input exclude_entities
  low_batteries: >
    {% set ns = namespace(items=[]) %}
    {# 1. Sensor có device_class = battery và state là số #}
    {% for s in states.sensor
       if s.attributes.device_class == 'battery'
       and s.entity_id not in excluded
       and s.state not in ['unknown', 'unavailable', 'none', '']
       and s.state | float(-1) >= 0
       and s.state | float(-1) <= (threshold | float) %}
      {% set ns.items = ns.items + [
        {'entity_id': s.entity_id,
         'name': s.name,
         'level': s.state | float}
      ] %}
    {% endfor %}
    {# 2. Entity bất kỳ có attribute battery_level #}
    {% for s in states
       if s.attributes.battery_level is defined
       and s.entity_id not in excluded
       and s.attributes.battery_level | float(-1) >= 0
       and s.attributes.battery_level | float(-1) <= (threshold | float) %}
      {% set ns.items = ns.items + [
        {'entity_id': s.entity_id,
         'name': s.name,
         'level': s.attributes.battery_level | float}
      ] %}
    {% endfor %}
    {{ ns.items | sort(attribute='level') }}

condition:
  - condition: template
    value_template: "{{ low_batteries | length > 0 }}"

action:
  - service: "notify.{{ notify_service }}"
    data:
      title: "Pin yếu ({{ low_batteries | length }} thiết bị)"
      message: >
        {% for b in low_batteries -%}
        - {{ b.name }}: {{ b.level | round(0) }}%
        {% endfor %}
